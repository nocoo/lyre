name = "lyre-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Empty by design — secrets injected via `wrangler secret put`.
[vars]

[[d1_databases]]
binding = "DB"
database_name = "lyre-db"
database_id = "PLACEHOLDER_PROD_D1_ID"

[triggers]
crons = ["* * * * *"]

[assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

# ─────────────────────────────────────────────────────────────────
# `test` env — used by E2E and a separate D1 instance.
# ─────────────────────────────────────────────────────────────────
[env.test]
name = "lyre-api-test"

[env.test.vars]
E2E_SKIP_AUTH = "true"

[[env.test.d1_databases]]
binding = "DB"
database_name = "lyre-db-test"
database_id = "PLACEHOLDER_TEST_D1_ID"
