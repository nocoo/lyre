name = "lyre-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Empty by design — secrets injected via `wrangler secret put`.
[vars]
NODE_ENV = "production"
OSS_BUCKET = "lyre"

[[d1_databases]]
binding = "DB"
database_name = "lyre-db"
database_id = "442d7cfb-e68d-4746-a83f-9eba16dd308c"

[[routes]]
pattern = "lyre.hexly.ai"
custom_domain = true

[triggers]
crons = ["* * * * *"]

[assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

# ─────────────────────────────────────────────────────────────────
# `test` env — used by E2E and a separate D1 instance.
# ─────────────────────────────────────────────────────────────────
[env.test]
name = "lyre-api-test"

[env.test.vars]
E2E_SKIP_AUTH = "true"
NODE_ENV = "production"
OSS_BUCKET = "lyre"

[[env.test.d1_databases]]
binding = "DB"
database_name = "lyre-db-test"
database_id = "99e130cd-a2ac-4150-a26d-077b6690496f"

[[env.test.routes]]
pattern = "lyre-test.hexly.ai"
custom_domain = true
