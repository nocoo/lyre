<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-24.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lyre - Audio Transcription Manager</title>
    <meta
      name="description"
      content="Upload, transcribe, and explore your audio recordings with word-level precision."
    />
    <!-- Blocking script: apply dark class before first paint to prevent FOUC -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("theme");
          var d = window.matchMedia("(prefers-color-scheme:dark)").matches;
          if (s === "dark" || (s !== "light" && d)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
